<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resources & Notes — StudyHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#0d0d0f; --surface:#141416; --surface-2:#1c1c1f; --surface-3:#222226;
      --border:#2a2a2e; --border-2:#323236;
      --text:#f0eff0; --muted:#7a7a82; --muted-2:#52525a;
      --accent:#6366f1; --accent-2:#818cf8; --accent-soft:#1e1d3a;
      --sb-w:230px; --topbar-h:56px;
      --font-d:'Instrument Serif',serif; --font-b:'Geist',sans-serif;
      --ease:cubic-bezier(.4,0,.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{font-family:var(--font-b);background:var(--bg);color:var(--text);display:flex;flex-direction:column}
    a{text-decoration:none;color:inherit}
    button{font-family:var(--font-b);cursor:pointer;border:none;background:none;color:inherit}

    /* TOPBAR */
    .topbar{height:var(--topbar-h);flex-shrink:0;display:flex;align-items:center;gap:1rem;padding:0 1.5rem;background:var(--surface);border-bottom:1px solid var(--border);z-index:50}
    .btn-back{display:inline-flex;align-items:center;gap:.35rem;font-size:.78rem;font-weight:500;color:var(--muted);padding:.38rem .85rem;border-radius:100px;border:1px solid var(--border);transition:color .14s,border-color .14s,background .14s}
    .btn-back:hover{color:var(--accent-2);border-color:var(--accent);background:var(--accent-soft)}
    .topbar-brand{font-family:var(--font-d);font-size:1.15rem;color:var(--text);margin-right:auto}
    .topbar-brand span{color:var(--accent-2)}
    .topbar-tag{font-size:.72rem;color:var(--muted-2);padding:.28rem .75rem;border-radius:100px;border:1px solid var(--border);background:var(--surface-2)}

    /* SUBJECT HERO */
    .subj-hero{display:none;align-items:center;gap:.9rem;padding:1.25rem 1.5rem;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;position:relative;overflow:hidden}
    .subj-hero.visible{display:flex}
    .subj-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 100% at 100% 50%,rgba(99,102,241,.07),transparent 70%);pointer-events:none}
    .sh-icon{width:40px;height:40px;border-radius:9px;display:grid;place-items:center;font-size:18px;border:1px solid var(--border);flex-shrink:0}
    .sh-text h2{font-size:1.1rem;font-weight:500;color:var(--text)}
    .sh-text p{font-size:.7rem;color:var(--muted);margin-top:.1rem}

    /* LAYOUT */
    .layout{display:flex;flex:1;overflow:hidden}

    /* SIDEBAR */
    .sidebar{width:var(--sb-w);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
    .sidebar::-webkit-scrollbar{width:3px}
    .sidebar::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:3px}
    .sb-head{padding:1.4rem 1.25rem .75rem}
    .sb-eyebrow{font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.11em;color:var(--muted-2);margin-bottom:.3rem}
    .sb-title{font-family:var(--font-d);font-size:1.1rem;color:var(--text)}
    .sb-divider{height:1px;background:var(--border);margin:0 1.25rem .5rem}
    .sb-section{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted-2);padding:.6rem 1.25rem .3rem}
    .sb-nav{padding:0 .6rem .6rem;display:flex;flex-direction:column;gap:1px}
    .sb-item{display:flex;align-items:center;gap:.7rem;padding:.62rem .85rem;border-radius:8px;font-size:.82rem;color:var(--muted);transition:background .14s,color .14s;text-align:left;width:100%}
    .sb-item:hover{background:var(--surface-2);color:var(--text)}
    .sb-item.active{background:var(--accent-soft);color:var(--accent-2)}
    .sb-item .ico{font-size:14px;width:18px;text-align:center;flex-shrink:0}
    .sb-badge{margin-left:auto;font-size:.62rem;font-weight:500;background:var(--surface-3);color:var(--muted-2);padding:1px 7px;border-radius:100px;flex-shrink:0}
    .sb-item.active .sb-badge{background:var(--accent-soft);color:var(--accent-2)}

    /* MAIN */
    .main{flex:1;overflow-y:auto;background:var(--bg)}
    .main::-webkit-scrollbar{width:4px}
    .main::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:3px}

    /* SCREENS */
    .screen{display:none;padding:1.75rem 2.5rem 2.5rem;animation:fadeUp .2s ease}
    .screen.active{display:block}
    @keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
    .screen-back{display:inline-flex;align-items:center;gap:.3rem;font-size:.74rem;color:var(--muted-2);margin-bottom:1.25rem;transition:color .13s}
    .screen-back:hover{color:var(--accent-2)}

    /* HUB */
    .page-header{margin-bottom:1.75rem}
    .page-header h1{font-family:var(--font-d);font-size:1.75rem;font-weight:400;color:var(--text);margin-bottom:.25rem}
    .page-header p{font-size:.8rem;color:var(--muted)}
    .hub-section{margin-bottom:2rem}
    .hub-section-label{font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted-2);margin-bottom:.85rem;display:flex;align-items:center;gap:.6rem}
    .hub-section-label::after{content:'';flex:1;height:1px;background:var(--border)}
    .subj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:.85rem}
    .subj-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.2rem 1.3rem;display:flex;flex-direction:column;gap:.6rem;text-align:left;transition:border-color .18s,transform .18s,box-shadow .18s}
    .subj-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 22px rgba(99,102,241,.11)}
    .sc-top{display:flex;align-items:center;justify-content:space-between}
    .sc-icon{width:40px;height:40px;border-radius:9px;display:grid;place-items:center;font-size:19px;border:1px solid var(--border);flex-shrink:0}
    .sc-ch{font-size:.62rem;color:var(--muted-2);background:var(--surface-2);border:1px solid var(--border);padding:2px 7px;border-radius:100px}
    .sc-name{font-size:.9rem;font-weight:600;color:var(--text)}
    .sc-desc{font-size:.74rem;color:var(--muted);line-height:1.55;flex:1}
    .sc-foot{display:flex;align-items:center;justify-content:space-between}
    .sc-tags{display:flex;gap:.25rem;flex-wrap:wrap}
    .sc-arrow{font-size:.72rem;color:var(--muted-2);transition:color .13s,transform .13s}
    .subj-card:hover .sc-arrow{color:var(--accent-2);transform:translateX(2px)}
    .tag{font-size:.6rem;font-weight:500;background:var(--surface-2);color:var(--muted);padding:2px 6px;border-radius:4px;border:1px solid var(--border)}

    /* MODE */
    .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .mode-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.75rem 1.5rem;display:flex;flex-direction:column;gap:.8rem;text-align:left;transition:border-color .18s,transform .18s,box-shadow .18s}
    .mode-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 7px 24px rgba(99,102,241,.13)}
    .mc-icon{font-size:28px}
    .mc-title{font-family:var(--font-d);font-size:1.35rem;font-weight:400;color:var(--text)}
    .mc-desc{font-size:.78rem;color:var(--muted);line-height:1.65}
    .mc-cta{font-size:.75rem;font-weight:500;color:var(--accent-2);margin-top:auto;padding-top:.25rem}

    /* ── COMPLETE SCREEN — accordion resource types ── */
    .rt-accordion{display:flex;flex-direction:column;gap:.55rem}

    .rt-item{background:var(--surface);border:1px solid var(--border);border-radius:13px;overflow:hidden;transition:border-color .18s}
    .rt-item.expanded{border-color:var(--accent)}

    .rt-header{display:flex;align-items:center;gap:.9rem;padding:1rem 1.2rem;cursor:pointer;transition:background .14s;user-select:none}
    .rt-header:hover{background:var(--surface-2)}
    .rt-item.expanded .rt-header{background:var(--surface-2)}

    .rt-icon{font-size:20px;flex-shrink:0}
    .rt-info{flex:1}
    .rt-title{font-size:.9rem;font-weight:600;color:var(--text);margin-bottom:.1rem}
    .rt-desc{font-size:.72rem;color:var(--muted)}
    .rt-count{font-size:.68rem;font-weight:500;color:var(--accent-2);margin-left:auto;flex-shrink:0;padding:0 .5rem}
    .rt-chevron{flex-shrink:0;color:var(--muted-2);font-size:.65rem;transition:transform .2s var(--ease)}
    .rt-item.expanded .rt-chevron{transform:rotate(180deg);color:var(--accent-2)}

    /* dropdown files */
    .rt-files{display:none;border-top:1px solid var(--border);padding:.75rem .9rem;flex-direction:column;gap:.45rem}
    .rt-item.expanded .rt-files{display:flex;animation:fadeUp .18s ease}

    .file-row{display:flex;align-items:center;gap:.75rem;background:var(--surface-3);border:1px solid var(--border);border-radius:10px;padding:.7rem .95rem;cursor:pointer;transition:border-color .14s,background .14s;text-align:left;width:100%}
    .file-row:hover{border-color:var(--accent);background:var(--surface-2)}
    .file-row-icon{width:32px;height:32px;border-radius:7px;display:grid;place-items:center;font-size:14px;border:1px solid var(--border);flex-shrink:0;background:var(--accent-soft)}
    .file-row-title{font-size:.82rem;font-weight:500;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .file-row-badge{font-size:.58rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--accent-2);background:var(--accent-soft);padding:.15rem .5rem;border-radius:100px;flex-shrink:0}
    .file-row-arrow{font-size:.7rem;color:var(--muted-2);flex-shrink:0;margin-left:.3rem;transition:color .13s,transform .13s}
    .file-row:hover .file-row-arrow{color:var(--accent-2);transform:translateX(2px)}

    .rt-empty{font-size:.76rem;color:var(--muted-2);padding:.5rem .25rem;text-align:center}

    /* CHAPTER GRID */
    .sec-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem}
    .sec-lbl{font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted-2)}
    .sec-cnt{font-size:.7rem;color:var(--muted-2)}
    .ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:.8rem;margin-bottom:1.5rem}
    .ch-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.05rem 1.15rem;display:flex;flex-direction:column;gap:.6rem;transition:border-color .16s,transform .16s}
    .ch-card:hover{border-color:var(--accent);transform:translateY(-2px)}
    .ch-top{display:flex;align-items:center;justify-content:space-between}
    .ch-num{font-size:.62rem;font-weight:600;color:var(--accent-2);letter-spacing:.07em;text-transform:uppercase}
    .ch-pill{font-size:.6rem;font-weight:500;background:var(--surface-2);color:var(--muted-2);padding:2px 7px;border-radius:100px;border:1px solid var(--border);display:flex;align-items:center;gap:3px}
    .ch-pill::before{content:'';width:4px;height:4px;border-radius:50%;background:currentColor}
    .ch-title{font-size:.86rem;font-weight:500;color:var(--text);line-height:1.4}
    .ch-desc{font-size:.74rem;color:var(--muted);line-height:1.55;flex:1}
    .ch-foot{display:flex;align-items:center;justify-content:space-between}
    .ch-tags{display:flex;flex-wrap:wrap;gap:.25rem}
    .ch-arrow{font-size:.72rem;color:var(--muted-2);transition:color .13s,transform .13s}
    .ch-card:hover .ch-arrow{color:var(--accent-2);transform:translateX(2px)}

    /* CHAPTER DROPDOWN */
    .ch-card{cursor:pointer}
    .ch-card.ch-open{border-color:var(--accent)}
    .ch-dropdown{display:none;border-top:1px solid var(--border);margin:0 -1.15rem -1.05rem;padding:.7rem .9rem;flex-direction:column;gap:.4rem;background:var(--surface-2);border-radius:0 0 12px 12px}
    .ch-card.ch-open .ch-dropdown{display:flex;animation:fadeUp .18s ease}
    .ch-pill.ch-open-pill{background:var(--accent-soft);color:var(--accent-2);border-color:var(--accent)}
    .ch-res-row{display:flex;align-items:center;gap:.65rem;background:var(--surface-3);border:1px solid var(--border);border-radius:9px;padding:.6rem .85rem;cursor:pointer;transition:border-color .14s,background .14s;text-align:left;width:100%}
    .ch-res-row:hover{border-color:var(--accent);background:var(--surface-2)}
    .ch-res-icon{width:28px;height:28px;border-radius:6px;display:grid;place-items:center;font-size:13px;border:1px solid var(--border);flex-shrink:0;background:var(--accent-soft)}
    .ch-res-label{font-size:.8rem;font-weight:500;color:var(--text);flex:1}
    .ch-res-badge{font-size:.58rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--accent-2);background:var(--accent-soft);padding:.15rem .5rem;border-radius:100px;flex-shrink:0}
    .ch-res-badge.soon{color:var(--muted-2);background:var(--surface-3)}
    .ch-res-arrow{font-size:.7rem;color:var(--muted-2);flex-shrink:0;margin-left:.3rem;transition:color .13s,transform .13s}
    .ch-res-row:hover .ch-res-arrow{color:var(--accent-2);transform:translateX(2px)}

    /* LOADING */
    .spin{width:18px;height:18px;border:2px solid var(--border-2);border-top-color:var(--accent-2);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.88);display:none;flex-direction:column}
    .modal-overlay.open{display:flex}
    .modal-bar{height:56px;flex-shrink:0;display:flex;align-items:center;gap:1rem;padding:0 1.25rem;background:var(--surface);border-bottom:1px solid var(--border)}
    .modal-close{display:inline-flex;align-items:center;gap:.35rem;font-size:.78rem;font-weight:500;color:var(--muted);padding:.38rem .85rem;border-radius:100px;border:1px solid var(--border);transition:color .14s,border-color .14s,background .14s}
    .modal-close:hover{color:var(--text);border-color:var(--border-2);background:var(--surface-2)}
    .modal-title{flex:1;font-size:.9rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .modal-ext{display:inline-flex;align-items:center;gap:.35rem;font-size:.78rem;font-weight:500;color:var(--accent-2);padding:.38rem .85rem;border-radius:100px;border:1px solid var(--accent);background:var(--accent-soft);transition:background .14s,color .14s}
    .modal-ext:hover{background:var(--accent);color:#fff}
    .modal-body{flex:1;overflow:hidden;background:#000;position:relative}
    .modal-body iframe{width:100%;height:100%;border:none;display:block}
    .modal-spinner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;background:#000;color:var(--muted-2);font-size:.8rem}
    .modal-spinner .spin{width:26px;height:26px}

    @media(max-width:900px){html,body{overflow:auto}.sidebar{display:none}.screen{padding:1.25rem 1rem 2rem}}
    @media(max-width:600px){.mode-grid{grid-template-columns:1fr}.topbar{padding:0 1rem}.topbar-tag{display:none}.subj-hero{padding:1rem}}
    @media(max-width:480px){.ch-grid{grid-template-columns:1fr}.subj-grid{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-bar">
    <button class="modal-close" id="modalClose">✕ Close</button>
    <span class="modal-title" id="modalTitle"></span>
    <a class="modal-ext" id="modalExt" href="#" target="_blank" rel="noopener">Open ↗</a>
  </div>
  <div class="modal-body">
    <iframe id="modalFrame" src="" allowfullscreen></iframe>
    <div class="modal-spinner" id="modalSpinner"><div class="spin"></div><p>Loading…</p></div>
  </div>
</div>

<header class="topbar">
  <a href="/" class="btn-back">← Home</a>
  <span class="topbar-brand">Study<span>Hub</span></span>
  <span class="topbar-tag">Class 12 · CBSE</span>
</header>

<div class="subj-hero" id="subjHero">
  <div class="sh-icon" id="subjHeroIcon"></div>
  <div class="sh-text"><h2 id="subjHeroName"></h2><p id="subjHeroMeta"></p></div>
</div>

<div class="layout">

  <!-- SIDEBAR — built dynamically from API -->
  <aside class="sidebar">
    <div class="sb-head"><p class="sb-eyebrow">Class 12</p><p class="sb-title">Resources &amp; Notes</p></div>
    <div class="sb-divider"></div>
    <div id="sidebarNav">
      <!-- populated by JS after API fetch -->
      <div style="padding:.75rem 1.25rem;font-size:.75rem;color:var(--muted-2);display:flex;align-items:center;gap:.5rem">
        <div class="spin"></div> Loading…
      </div>
    </div>
  </aside>

  <main class="main" id="mainArea">

    <!-- SCREEN 0: Hub — subject cards (built dynamically) -->
    <div class="screen active" id="screen-hub">
      <div class="page-header"><h1>Resources &amp; Notes</h1><p>Pick a subject to get started.</p></div>
      <div id="hubContent">
        <div style="display:flex;align-items:center;gap:.75rem;padding:1rem 0;font-size:.8rem;color:var(--muted-2)">
          <div class="spin"></div> Loading subjects…
        </div>
      </div>
    </div>

    <!-- SCREEN 1: Mode -->
    <div class="screen" id="screen-mode">
      <button class="screen-back" id="modeBack">← Back to subjects</button>
      <div class="mode-grid">
        <button class="mode-card" id="btnChapterwise">
          <div class="mc-icon">📚</div>
          <p class="mc-title">Chapterwise</p>
          <p class="mc-desc">Browse all chapters one by one. Click into any chapter to open its resources.</p>
          <span class="mc-cta">Go to chapters →</span>
        </button>
        <button class="mode-card" id="btnComplete">
          <div class="mc-icon">📂</div>
          <p class="mc-title">Complete</p>
          <p class="mc-desc">All resource types in one place — click any to expand and view files instantly.</p>
          <span class="mc-cta">View all resources →</span>
        </button>
      </div>
    </div>

    <!-- SCREEN 2A: Chapters -->
    <div class="screen" id="screen-chapters">
      <button class="screen-back" id="chapBack">← Back</button>
      <div id="chapContent"></div>
    </div>

    <!-- SCREEN 2B: Complete — accordion resource types -->
    <div class="screen" id="screen-complete">
      <button class="screen-back" id="completeBack">← Back</button>
      <div class="rt-accordion" id="rtAccordion"></div>
    </div>

  </main>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

  /* ══════════════════════════════════════
     SUBJECT METADATA
     Add subjects here as you create them.
     icon, bg, meta are just visual — the
     actual resources come from the API.
  ══════════════════════════════════════ */
  var subjectMeta = {
    'Physics':         { icon:'⚡', bg:'#1e1d3a', meta:'Class 12 · CBSE · 15 Chapters', desc:'Electric charges, optics, modern physics, semiconductors.' },
    'Chemistry':       { icon:'🧪', bg:'#0d2626', meta:'Class 12 · CBSE · 16 Chapters', desc:'Solid state, electrochemistry, organic chemistry.' },
    'Biology':         { icon:'🌱', bg:'#0d1f15', meta:'Class 12 · CBSE · 16 Chapters', desc:'Reproduction, genetics, evolution, biotechnology.' },
    'Mathematics':     { icon:'📐', bg:'#1f1a0d', meta:'Class 12 · CBSE · 13 Chapters', desc:'Relations, matrices, calculus, vectors, probability.' },
    'English':         { icon:'📖', bg:'#1f0d10', meta:'Class 12 · CBSE · Flamingo & Vistas', desc:'Flamingo and Vistas — prose, poetry, summaries.' },
    'History':         { icon:'🏛️', bg:'#1a1520', meta:'Class 12 · CBSE · 15 Chapters', desc:'Ancient, medieval and modern Indian history.' },
    'Economics':       { icon:'💰', bg:'#1f1408', meta:'Class 12 · CBSE · 10 Chapters', desc:'Micro and macroeconomics — theory and graphs.' },
    'Computer Science':{ icon:'💻', bg:'#111518', meta:'Class 12 · CBSE · 9 Chapters',  desc:'Python, OOP, file handling, SQL, networking.' },
    'Maths':           { icon:'📐', bg:'#1f1a0d', meta:'Class 12 · CBSE · 13 Chapters', desc:'Relations, matrices, calculus, vectors, probability.' },
  };

  var resTypeMeta = {
    notes:         { icon:'📄', title:'Notes',              desc:'Theory notes and study material.' },
    pyqs:          { icon:'🎯', title:'PYQs',               desc:'Past year question papers.' },
    markingscheme: { icon:'✅', title:'PYQ Marking Scheme', desc:'Marking schemes for past year papers.' },
    videos:        { icon:'🎬', title:'Video Links',        desc:'Curated video lectures.' },
  };


 var resTypeOrder = ['notes','pyqs','markingscheme','videos'];

  /* ── State ── */
  var appData     = {};
  var currentSubj = null;
  var mainArea    = document.getElementById('mainArea');

  /* ── Modal ── */
  function getEmbedUrl(url) {
    var df = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
    if (df) return 'https://drive.google.com/file/d/' + df[1] + '/preview';
    var fol = url.match(/\/drive\/folders\/([a-zA-Z0-9_-]+)/);
    if (fol) return 'https://drive.google.com/embeddedfolderview?id=' + fol[1] + '#list';
    var ytpl = url.match(/[?&]list=([^&]+)/);
    if (ytpl) return 'https://www.youtube.com/embed/videoseries?list=' + ytpl[1];
    var yt = url.match(/youtube\.com\/watch\?v=([^&]+)/);
    if (yt) return 'https://www.youtube.com/embed/' + yt[1];
    return url;
  }

  function getLinkMeta(url) {
    if (/drive\.google\.com\/file/.test(url))  return { badge:'PDF',    icon:'📄' };
    if (/drive\.google\.com\/drive/.test(url)) return { badge:'Folder', icon:'📁' };
    if (/youtube\.com|youtu\.be/.test(url))    return { badge:'Video',  icon:'🎬' };
    return { badge:'Link', icon:'🔗' };
  }

  function openModal(title, url) {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalExt').href = url;
    document.getElementById('modalFrame').src = '';
    document.getElementById('modalSpinner').style.display = 'flex';
    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    setTimeout(function () {
      var f = document.getElementById('modalFrame');
      f.src = getEmbedUrl(url);
      f.onload = function () { document.getElementById('modalSpinner').style.display = 'none'; };
    }, 120);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.getElementById('modalFrame').src = '';
    document.body.style.overflow = '';
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', function (e) { if (e.target === this) closeModal(); });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeModal(); });

  /* ── Screens ── */
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(function (s) { s.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
    mainArea.scrollTop = 0;
  }

  function setHero(subj) {
    var m = subjectMeta[subj] || { icon:'📚', bg:'#1e1d3a', meta:'Class 12 · CBSE' };
    document.getElementById('subjHeroIcon').textContent      = m.icon;
    document.getElementById('subjHeroIcon').style.background = m.bg;
    document.getElementById('subjHeroName').textContent      = subj;
    document.getElementById('subjHeroMeta').textContent      = m.meta;
    document.getElementById('subjHero').classList.add('visible');
  }

  function clearHero() {
    document.getElementById('subjHero').classList.remove('visible');
    document.querySelectorAll('.sb-item').forEach(function (b) { b.classList.remove('active'); });
  }

  function pickSubject(subj) {
    currentSubj = subj;
    setHero(subj);
    document.querySelectorAll('.sb-item').forEach(function (b) { b.classList.remove('active'); });
    var sb = document.querySelector('.sb-item[data-subj="' + subj + '"]');
    if (sb) sb.classList.add('active');
    showScreen('screen-mode');
  }

  /* ── Build hub subject cards from API data ── */
  function buildHub(data) {
    var subjects = Object.keys(data).sort();
    var hubEl    = document.getElementById('hubContent');

    if (!subjects.length) {
      hubEl.innerHTML = '<p style="font-size:.8rem;color:var(--muted-2)">No subjects found. Add folders to resources-data/</p>';
      return;
    }

    var html = '<div class="subj-grid">';
    subjects.forEach(function (subj) {
      var m    = subjectMeta[subj] || { icon:'📚', bg:'#1e1d3a', desc:'Resources for ' + subj };
      var keys = Object.keys(data[subj]);
      var tags = keys.map(function (k) {
        var rt = resTypeMeta[k];
        return rt ? '<span class="tag">' + rt.title + '</span>' : '';
      }).join('');
      html += '<button class="subj-card" data-subj="' + subj + '">' +
        '<div class="sc-top"><div class="sc-icon" style="background:' + m.bg + '">' + m.icon + '</div>' +
        '<span class="sc-ch">' + keys.length + ' types</span></div>' +
        '<p class="sc-name">' + subj + '</p>' +
        '<p class="sc-desc">' + (m.desc || '') + '</p>' +
        '<div class="sc-foot"><div class="sc-tags">' + tags + '</div><span class="sc-arrow">→</span></div>' +
        '</button>';
    });
    html += '</div>';
    hubEl.innerHTML = html;

    document.querySelectorAll('.subj-card').forEach(function (btn) {
      btn.addEventListener('click', function () { pickSubject(this.getAttribute('data-subj')); });
    });
  }

  /* ── Build sidebar from API data ── */
  function buildSidebar(data) {
    var nav      = document.getElementById('sidebarNav');
    var subjects = Object.keys(data).sort();

    if (!subjects.length) {
      nav.innerHTML = '<p style="padding:.5rem 1.25rem;font-size:.74rem;color:var(--muted-2)">No subjects yet.</p>';
      return;
    }

    // Group into sections (could expand later)
    var html = '<p class="sb-section">All Subjects</p><nav class="sb-nav">';
    subjects.forEach(function (subj) {
      var m = subjectMeta[subj] || { icon:'📚' };
      html += '<button class="sb-item" data-subj="' + subj + '">' +
        '<span class="ico">' + m.icon + '</span>' + subj +
        '<span class="sb-badge">' + Object.keys(data[subj]).length + '</span>' +
        '</button>';
    });
    html += '</nav>';
    nav.innerHTML = html;

    document.querySelectorAll('.sb-item').forEach(function (btn) {
      btn.addEventListener('click', function () { pickSubject(this.getAttribute('data-subj')); });
    });
  }

  /* ── Build complete screen — accordion with inline file dropdowns ── */
  function buildComplete(subj) {
    var data   = appData[subj] || {};
    var acc    = document.getElementById('rtAccordion');
    acc.innerHTML = '';

    var hasAny = false;

    resTypeOrder.forEach(function (key) {
      var rt    = resTypeMeta[key];
      var files = data[key] || [];

      var item = document.createElement('div');
      item.className = 'rt-item';

      var header = document.createElement('div');
      header.className = 'rt-header';
      header.innerHTML =
        '<span class="rt-icon">' + rt.icon + '</span>' +
        '<div class="rt-info">' +
          '<p class="rt-title">' + rt.title + '</p>' +
          '<p class="rt-desc">' + rt.desc + '</p>' +
        '</div>' +
        '<span class="rt-count">' + (files.length ? files.length + ' file' + (files.length > 1 ? 's' : '') : 'Coming soon') + '</span>' +
        '<span class="rt-chevron">▼</span>';

      var filesEl = document.createElement('div');
      filesEl.className = 'rt-files';

      if (!files.length) {
        filesEl.innerHTML = '<p class="rt-empty">No resources added yet — check back soon.</p>';
      } else {
        hasAny = true;
        files.forEach(function (f) {
          var meta = getLinkMeta(f.link);
          var row  = document.createElement('button');
          row.className = 'file-row';
          row.innerHTML =
            '<div class="file-row-icon">' + meta.icon + '</div>' +
            '<span class="file-row-title">' + f.title + '</span>' +
            '<span class="file-row-badge">' + meta.badge + '</span>' +
            '<span class="file-row-arrow">→</span>';
          row.addEventListener('click', function () { openModal(f.title, f.link); });
          filesEl.appendChild(row);
        });
      }

      header.addEventListener('click', function () {
        item.classList.toggle('expanded');
      });

      item.appendChild(header);
      item.appendChild(filesEl);
      acc.appendChild(item);
    });
  }

          // Try to find chapter-specific file; fall back to showing the resource type
          var isAvail  = rt.available;
          return '<button class="ch-res-row" data-key="' + rt.key + '" data-ch="' + ch.n + '" ' + (isAvail ? '' : 'disabled style="cursor:default;opacity:.45"') + '>' +
            '<div class="ch-res-icon">' + rt.icon + '</div>' +
            '<span class="ch-res-label">' + rt.label + '</span>' +
            '<span class="ch-res-badge' + (isAvail ? '' : ' soon') + '">' + (isAvail ? 'Available' : 'Soon') + '</span>' +
            '<span class="ch-res-arrow">→</span>' +
            '</button>';
        }).join('');

        var card = document.createElement('div');
        card.className = 'ch-card';
        card.innerHTML =
          '<div class="ch-top"><span class="ch-num">Ch ' + ch.n + '</span><span class="ch-pill" id="pill-' + subj.replace(/\s/g,'') + ch.n + '">Resources ▾</span></div>' +
          '<p class="ch-title">' + ch.t + '</p>' +
          '<p class="ch-desc">' + ch.d + '</p>' +
          '<div class="ch-foot"><div class="ch-tags">' + tags + '</div><span class="ch-arrow">→</span></div>' +
          '<div class="ch-dropdown">' + resRows + '</div>';

        // Toggle dropdown on card click
        card.addEventListener('click', function (e) {
          // If clicking a resource row button, handle separately
          if (e.target.closest('.ch-res-row')) return;
          var isOpen = card.classList.toggle('ch-open');
          var pill = card.querySelector('.ch-pill');
          pill.textContent = isOpen ? 'Resources ▴' : 'Resources ▾';
          if (isOpen) pill.classList.add('ch-open-pill');
          else        pill.classList.remove('ch-open-pill');
        });

        // Resource row clicks
        card.querySelectorAll && setTimeout(function () {
          card.querySelectorAll('.ch-res-row:not([disabled])').forEach(function (btn) {
            btn.addEventListener('click', function (e) {
              e.stopPropagation();
              var key     = btn.getAttribute('data-key');
              var chNum   = btn.getAttribute('data-ch');
              var subjData = appData[subj] || {};
              var files    = subjData[key] || [];
              // Try to find a file whose title matches the chapter
              var match = files.find(function (f) {
                return f.title && (f.title.toLowerCase().includes('ch' + chNum) || f.title.toLowerCase().includes('chapter ' + parseInt(chNum)));
              });
              if (match) {
                openModal(match.title, match.link);
              } else if (files.length) {
                // Open the first file for now; you can refine per-chapter later
                openModal(files[0].title, files[0].link);
              } else {
                alert('No ' + key + ' resources added yet for Ch ' + chNum + '. Add them in resources-data/.');
              }
            });
          });
        }, 0);

        grid.appendChild(card);
      });

      el.appendChild(grid);
    });
  }

  /* ── Wire buttons ── */
  document.getElementById('btnChapterwise').addEventListener('click', function () {
    buildChapters(currentSubj);
    showScreen('screen-chapters');
  });

  document.getElementById('btnComplete').addEventListener('click', function () {
    buildComplete(currentSubj);
    showScreen('screen-complete');
  });

  document.getElementById('modeBack').addEventListener('click', function () {
    clearHero(); currentSubj = null; showScreen('screen-hub');
  });

  document.getElementById('chapBack').addEventListener('click', function () { showScreen('screen-mode'); });
  document.getElementById('completeBack').addEventListener('click', function () { showScreen('screen-mode'); });

  /* ── Fetch from API ── */
  fetch('/api/resources')
    .then(function (r) { return r.json(); })
    .then(function (data) {
      appData = data;
      buildHub(data);
      buildSidebar(data);
    })
    .catch(function (err) {
      console.error(err);
      document.getElementById('hubContent').innerHTML =
        '<p style="font-size:.8rem;color:var(--muted-2)">Could not load resources. Make sure the API is deployed on Vercel.</p>';
    });

});
</script>
</body>
</html>
