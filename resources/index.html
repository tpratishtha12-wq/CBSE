<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resources & Notes — StudyHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#0d0d0f; --surface:#141416; --surface-2:#1c1c1f; --surface-3:#222226;
      --border:#2a2a2e; --border-2:#323236;
      --text:#f0eff0; --muted:#7a7a82; --muted-2:#52525a;
      --accent:#6366f1; --accent-2:#818cf8; --accent-soft:#1e1d3a;
      --sb-w:260px; --topbar-h:56px;
      --font-d:'Instrument Serif',serif; --font-b:'Geist',sans-serif;
      --ease:cubic-bezier(.4,0,.2,1);
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    html,body { height:100%; overflow:hidden; }
    body { font-family:var(--font-b); background:var(--bg); color:var(--text); display:flex; flex-direction:column; }
    a { text-decoration:none; color:inherit; }
    button { font-family:var(--font-b); cursor:pointer; border:none; background:none; color:inherit; }

    /* TOPBAR */
    .topbar { height:var(--topbar-h); flex-shrink:0; display:flex; align-items:center; gap:1rem; padding:0 1.5rem; background:var(--surface); border-bottom:1px solid var(--border); z-index:50; }
    .btn-back { display:inline-flex; align-items:center; gap:.35rem; font-size:.78rem; font-weight:500; color:var(--muted); padding:.38rem .85rem; border-radius:100px; border:1px solid var(--border); transition:color .14s,border-color .14s,background .14s; }
    .btn-back:hover { color:var(--accent-2); border-color:var(--accent); background:var(--accent-soft); }
    .topbar-brand { font-family:var(--font-d); font-size:1.15rem; color:var(--text); margin-right:auto; }
    .topbar-brand span { color:var(--accent-2); }

    /* LAYOUT */
    .layout { display:flex; flex:1; overflow:hidden; }

    /* SIDEBAR */
    .sidebar { width:var(--sb-w); flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; }
    .sidebar::-webkit-scrollbar { width:3px; }
    .sidebar::-webkit-scrollbar-thumb { background:var(--border-2); border-radius:3px; }

    .sb-head { padding:1.4rem 1.25rem .75rem; }
    .sb-eyebrow { font-size:.62rem; font-weight:600; text-transform:uppercase; letter-spacing:.11em; color:var(--muted-2); margin-bottom:.3rem; }
    .sb-title { font-family:var(--font-d); font-size:1.1rem; color:var(--text); }
    .sb-divider { height:1px; background:var(--border); margin:0 1.25rem .75rem; }

    /* Sidebar tree */
    .sb-tree { padding:.25rem .6rem 1.5rem; }

    .sb-subject { margin-bottom:.25rem; }
    .sb-subject-btn {
      display:flex; align-items:center; gap:.6rem; width:100%;
      padding:.6rem .85rem; border-radius:8px;
      font-size:.84rem; font-weight:600; color:var(--text);
      transition:background .13s;
    }
    .sb-subject-btn:hover { background:var(--surface-2); }
    .sb-subject-btn .sb-chevron { margin-left:auto; font-size:.65rem; color:var(--muted-2); transition:transform .2s; }
    .sb-subject-btn.open .sb-chevron { transform:rotate(90deg); }

    .sb-subfolders { display:none; padding-left:.5rem; margin-bottom:.25rem; }
    .sb-subfolders.open { display:block; }

    .sb-subfolder { margin-bottom:.15rem; }
    .sb-subfolder-btn {
      display:flex; align-items:center; gap:.55rem; width:100%;
      padding:.45rem .85rem; border-radius:7px;
      font-size:.78rem; color:var(--muted);
      transition:background .13s, color .13s;
    }
    .sb-subfolder-btn:hover { background:var(--surface-2); color:var(--text); }
    .sb-subfolder-btn.active { background:var(--accent-soft); color:var(--accent-2); }
    .sb-subfolder-btn .sb-chevron { margin-left:auto; font-size:.62rem; color:var(--muted-2); transition:transform .2s; }
    .sb-subfolder-btn.open .sb-chevron { transform:rotate(90deg); }

    .sb-files { display:none; padding-left:.75rem; margin-bottom:.1rem; }
    .sb-files.open { display:block; }
    .sb-file-btn {
      display:flex; align-items:center; gap:.5rem; width:100%;
      padding:.4rem .85rem; border-radius:6px;
      font-size:.75rem; color:var(--muted-2);
      transition:background .13s, color .13s;
      text-align:left;
    }
    .sb-file-btn:hover { background:var(--surface-2); color:var(--text); }
    .sb-file-btn.active { color:var(--accent-2); }
    .sb-file-btn::before { content:''; width:5px; height:5px; border-radius:50%; background:var(--border-2); flex-shrink:0; }
    .sb-file-btn.active::before { background:var(--accent-2); }

    /* MAIN */
    .main { flex:1; overflow-y:auto; background:var(--bg); display:flex; flex-direction:column; }
    .main::-webkit-scrollbar { width:4px; }
    .main::-webkit-scrollbar-thumb { background:var(--border-2); border-radius:3px; }

    /* WELCOME */
    .welcome { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; text-align:center; gap:.85rem; padding:2rem; }
    .w-icon { width:64px; height:64px; background:var(--accent-soft); border-radius:50%; display:grid; place-items:center; font-size:28px; margin-bottom:.4rem; }
    .welcome h2 { font-family:var(--font-d); font-size:1.5rem; font-weight:400; color:var(--text); }
    .welcome p { font-size:.85rem; color:var(--muted); max-width:280px; line-height:1.65; }

    /* VIEWER */
    .viewer { display:none; flex-direction:column; flex:1; }
    .viewer.active { display:flex; }

    .viewer-header {
      padding:1.5rem 2rem 1.25rem; background:var(--surface);
      border-bottom:1px solid var(--border); flex-shrink:0;
    }
    .viewer-breadcrumb { display:flex; align-items:center; gap:.4rem; font-size:.72rem; color:var(--muted-2); margin-bottom:.6rem; flex-wrap:wrap; }
    .viewer-breadcrumb .sep { color:var(--border-2); }
    .viewer-breadcrumb span:last-child { color:var(--text); font-weight:500; }
    .viewer-title { font-family:var(--font-d); font-size:1.5rem; font-weight:400; color:var(--text); margin-bottom:.25rem; }
    .viewer-sub { font-size:.76rem; color:var(--muted); }

    .viewer-actions { display:flex; gap:.6rem; margin-top:.85rem; }
    .btn-ext {
      display:inline-flex; align-items:center; gap:.4rem;
      font-size:.78rem; font-weight:500; color:var(--accent-2);
      padding:.4rem .9rem; border-radius:100px;
      border:1px solid var(--accent); background:var(--accent-soft);
      transition:background .14s, color .14s;
    }
    .btn-ext:hover { background:var(--accent); color:#fff; }

    .viewer-frame { flex:1; border:none; background:#000; }

    /* SUBFOLDER VIEW (list of files) */
    .folder-view { display:none; flex-direction:column; flex:1; }
    .folder-view.active { display:flex; }
    .folder-inner { padding:1.75rem 2.5rem 2.5rem; flex:1; overflow-y:auto; }
    .folder-header { margin-bottom:1.75rem; padding-bottom:1.25rem; border-bottom:1px solid var(--border); }
    .folder-breadcrumb { display:flex; align-items:center; gap:.4rem; font-size:.72rem; color:var(--muted-2); margin-bottom:.5rem; }
    .folder-breadcrumb .sep { color:var(--border-2); }
    .folder-header h1 { font-family:var(--font-d); font-size:1.6rem; font-weight:400; color:var(--text); margin-bottom:.2rem; }
    .folder-header p { font-size:.76rem; color:var(--muted); }

    .file-list { display:flex; flex-direction:column; gap:.55rem; }
    .file-card {
      display:flex; align-items:center; gap:.9rem;
      background:var(--surface); border:1px solid var(--border); border-radius:12px;
      padding:.85rem 1.1rem; cursor:pointer;
      transition:border-color .15s, transform .15s; text-align:left; width:100%;
    }
    .file-card:hover { border-color:var(--accent); transform:translateX(3px); }
    .file-card-icon { width:38px; height:38px; border-radius:8px; display:grid; place-items:center; font-size:17px; border:1px solid var(--border); flex-shrink:0; }
    .file-card-info { flex:1; min-width:0; }
    .file-card-title { font-size:.88rem; font-weight:500; color:var(--text); margin-bottom:.1rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .file-card-sub { font-size:.7rem; color:var(--muted); }
    .file-card-badge { font-size:.58rem; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--accent-2); background:var(--accent-soft); padding:.18rem .55rem; border-radius:100px; flex-shrink:0; }
    .file-card-arrow { font-size:.75rem; color:var(--muted-2); flex-shrink:0; margin-left:.35rem; transition:color .13s, transform .13s; }
    .file-card:hover .file-card-arrow { color:var(--accent-2); transform:translateX(2px); }

    /* LOADING */
    .loading { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; gap:.75rem; color:var(--muted-2); font-size:.82rem; }
    .spin { width:28px; height:28px; border:2px solid var(--border-2); border-top-color:var(--accent-2); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .empty { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; text-align:center; gap:.6rem; color:var(--muted-2); padding:2rem; }
    .empty .ei { font-size:28px; opacity:.4; margin-bottom:.2rem; }
    .empty p { font-size:.78rem; line-height:1.6; }

    @media(max-width:900px) { html,body { overflow:auto; } .sidebar { display:none; } }
    @media(max-width:600px) { .topbar { padding:0 1rem; } .folder-inner { padding:1.25rem 1rem; } }
  </style>
</head>
<body>

<header class="topbar">
  <a href="/" class="btn-back">← Home</a>
  <span class="topbar-brand">Study<span>Hub</span></span>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-head">
      <p class="sb-eyebrow">Class 12</p>
      <p class="sb-title">Resources &amp; Notes</p>
    </div>
    <div class="sb-divider"></div>
    <div class="sb-tree" id="sbTree">
      <div class="loading" style="min-height:120px">
        <div class="spin"></div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main">

    <!-- Welcome -->
    <div class="welcome" id="welcome">
      <div class="w-icon">📚</div>
      <h2>Pick a subject</h2>
      <p>Select a subject and subfolder from the sidebar to browse resources.</p>
    </div>

    <!-- Folder view — list of files in a subfolder -->
    <div class="folder-view" id="folderView">
      <div class="folder-inner">
        <div class="folder-header">
          <div class="folder-breadcrumb" id="folderBreadcrumb"></div>
          <h1 id="folderTitle"></h1>
          <p id="folderSub"></p>
        </div>
        <div class="file-list" id="fileList"></div>
      </div>
    </div>

    <!-- Viewer — iframe for a single file -->
    <div class="viewer" id="viewer">
      <div class="viewer-header">
        <div class="viewer-breadcrumb" id="viewerBreadcrumb"></div>
        <p class="viewer-title" id="viewerTitle"></p>
        <p class="viewer-sub" id="viewerSub"></p>
        <div class="viewer-actions">
          <a class="btn-ext" id="viewerExtLink" href="#" target="_blank" rel="noopener">Open in Drive ↗</a>
          <button class="btn-back" id="viewerBack">← Back</button>
        </div>
      </div>
      <iframe class="viewer-frame" id="viewerFrame" allowfullscreen></iframe>
    </div>

  </main>
</div>

<script>
/* ── Drive preview URL converter ── */
function drivePreview(url) {
  var m = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) ||
          url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m) return 'https://drive.google.com/file/d/' + m[1] + '/preview';

  var fol = url.match(/\/drive\/folders\/([a-zA-Z0-9_-]+)/);
  if (fol) return 'https://drive.google.com/embeddedfolderview?id=' + fol[1] + '#list';

  var ytpl = url.match(/[?&]list=([^&]+)/);
  if (ytpl) return 'https://www.youtube.com/embed/videoseries?list=' + ytpl[1];

  var yt = url.match(/youtube\.com\/watch\?v=([^&]+)/);
  if (yt) return 'https://www.youtube.com/embed/' + yt[1];

  return url;
}

function getLinkType(url) {
  if (/drive\.google\.com\/file/.test(url))    return { badge:'PDF',    icon:'📄' };
  if (/drive\.google\.com\/drive/.test(url))   return { badge:'Folder', icon:'📁' };
  if (/youtube\.com|youtu\.be/.test(url))      return { badge:'Video',  icon:'🎬' };
  return { badge:'Link', icon:'🔗' };
}

/* ── State ── */
var currentSubject   = null;
var currentSubfolder = null;
var currentFile      = null;
var appData          = {};

/* ── Views ── */
function showWelcome() {
  document.getElementById('welcome').style.display    = 'flex';
  document.getElementById('folderView').classList.remove('active');
  document.getElementById('viewer').classList.remove('active');
}

function showFolderView(subject, subfolder, files) {
  currentSubject   = subject;
  currentSubfolder = subfolder;
  currentFile      = null;

  // breadcrumb
  document.getElementById('folderBreadcrumb').innerHTML =
    '<span>' + subject + '</span><span class="sep">›</span><span>' + subfolder + '</span>';

  document.getElementById('folderTitle').textContent = subfolder;
  document.getElementById('folderSub').textContent   =
    files.length + ' resource' + (files.length !== 1 ? 's' : '');

  // file cards
  var list = document.getElementById('fileList');
  list.innerHTML = '';
  files.forEach(function(f) {
    var meta = getLinkType(f.link);
    var btn  = document.createElement('button');
    btn.className = 'file-card';
    btn.innerHTML =
      '<div class="file-card-icon" style="background:var(--accent-soft)">' + meta.icon + '</div>' +
      '<div class="file-card-info">' +
        '<p class="file-card-title">' + f.title + '</p>' +
        '<p class="file-card-sub">Click to view · ' + meta.badge + '</p>' +
      '</div>' +
      '<span class="file-card-badge">' + meta.badge + '</span>' +
      '<span class="file-card-arrow">→</span>';
    btn.addEventListener('click', function() { openViewer(subject, subfolder, f); });
    list.appendChild(btn);
  });

  document.getElementById('welcome').style.display    = 'none';
  document.getElementById('viewer').classList.remove('active');
  document.getElementById('folderView').classList.add('active');

  // update sidebar active states
  updateSidebarActive(subject, subfolder, null);
}

function openViewer(subject, subfolder, file) {
  currentFile = file;

  document.getElementById('viewerBreadcrumb').innerHTML =
    '<span>' + subject + '</span><span class="sep">›</span>' +
    '<span>' + subfolder + '</span><span class="sep">›</span>' +
    '<span>' + file.title + '</span>';

  document.getElementById('viewerTitle').textContent   = file.title;
  document.getElementById('viewerSub').textContent     = subject + ' · ' + subfolder;
  document.getElementById('viewerExtLink').href        = file.link;
  document.getElementById('viewerFrame').src           = drivePreview(file.link);

  document.getElementById('folderView').classList.remove('active');
  document.getElementById('viewer').classList.add('active');

  updateSidebarActive(subject, subfolder, file.title);
}

/* ── Sidebar active state ── */
function updateSidebarActive(subject, subfolder, fileTitle) {
  document.querySelectorAll('.sb-subfolder-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelectorAll('.sb-file-btn').forEach(function(b) { b.classList.remove('active'); });

  if (subfolder) {
    var sb = document.querySelector('.sb-subfolder-btn[data-subject="'+subject+'"][data-subfolder="'+subfolder+'"]');
    if (sb) sb.classList.add('active');
  }
  if (fileTitle) {
    var fb = document.querySelector('.sb-file-btn[data-subject="'+subject+'"][data-subfolder="'+subfolder+'"][data-title="'+fileTitle+'"]');
    if (fb) fb.classList.add('active');
  }
}

/* ── Build sidebar tree ── */
function buildSidebar(data) {
  var tree = document.getElementById('sbTree');
  tree.innerHTML = '';

  var subjects = Object.keys(data).sort();
  if (!subjects.length) {
    tree.innerHTML = '<p style="font-size:.76rem;color:var(--muted-2);padding:.5rem .85rem">No resources found.<br>Add text files to resources-data/</p>';
    return;
  }

  subjects.forEach(function(subject) {
    var subjectEl = document.createElement('div');
    subjectEl.className = 'sb-subject';

    var subjBtn = document.createElement('button');
    subjBtn.className = 'sb-subject-btn open';
    subjBtn.innerHTML = '<span>' + subject + '</span><span class="sb-chevron">▶</span>';

    var subfoldersEl = document.createElement('div');
    subfoldersEl.className = 'sb-subfolders open';

    subjBtn.addEventListener('click', function() {
      this.classList.toggle('open');
      subfoldersEl.classList.toggle('open');
    });

    var subfolders = Object.keys(data[subject]).sort();
    subfolders.forEach(function(subfolder) {
      var files = data[subject][subfolder];

      var subfolderEl = document.createElement('div');
      subfolderEl.className = 'sb-subfolder';

      var subBtn = document.createElement('button');
      subBtn.className = 'sb-subfolder-btn';
      subBtn.setAttribute('data-subject', subject);
      subBtn.setAttribute('data-subfolder', subfolder);
      subBtn.innerHTML = '<span>' + subfolder + '</span><span class="sb-chevron">▶</span>';

      var filesEl = document.createElement('div');
      filesEl.className = 'sb-files';

      subBtn.addEventListener('click', function() {
        this.classList.toggle('open');
        filesEl.classList.toggle('open');
        showFolderView(subject, subfolder, files);
      });

      files.forEach(function(f) {
        var fileBtn = document.createElement('button');
        fileBtn.className = 'sb-file-btn';
        fileBtn.setAttribute('data-subject', subject);
        fileBtn.setAttribute('data-subfolder', subfolder);
        fileBtn.setAttribute('data-title', f.title);
        fileBtn.textContent = f.title;
        fileBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          openViewer(subject, subfolder, f);
        });
        filesEl.appendChild(fileBtn);
      });

      subfolderEl.appendChild(subBtn);
      subfolderEl.appendChild(filesEl);
      subfoldersEl.appendChild(subfolderEl);
    });

    subjectEl.appendChild(subjBtn);
    subjectEl.appendChild(subfoldersEl);
    tree.appendChild(subjectEl);
  });
}

/* ── Viewer back button ── */
document.getElementById('viewerBack').addEventListener('click', function() {
  if (currentSubject && currentSubfolder && appData[currentSubject] && appData[currentSubject][currentSubfolder]) {
    showFolderView(currentSubject, currentSubfolder, appData[currentSubject][currentSubfolder]);
  } else {
    showWelcome();
  }
});

/* ── Fetch data from serverless API ── */
fetch('/api/resources')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    appData = data;
    buildSidebar(data);
  })
  .catch(function(err) {
    console.error(err);
    document.getElementById('sbTree').innerHTML =
      '<p style="font-size:.76rem;color:var(--muted-2);padding:.5rem .85rem;line-height:1.6">Could not load resources.<br>Make sure the API is deployed.</p>';
  });
</script>
</body>
</html>
