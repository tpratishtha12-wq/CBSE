<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resources & Notes — StudyHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#0d0d0f;--surface:#141416;--surface-2:#1c1c1f;--surface-3:#222226;
      --border:#2a2a2e;--border-2:#323236;
      --text:#f0eff0;--muted:#7a7a82;--muted-2:#52525a;
      --accent:#6366f1;--accent-2:#818cf8;--accent-soft:#1e1d3a;
      --sb-w:230px;--topbar-h:56px;
      --font-d:'Instrument Serif',serif;--font-b:'Geist',sans-serif;
      --ease:cubic-bezier(.4,0,.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{font-family:var(--font-b);background:var(--bg);color:var(--text);display:flex;flex-direction:column}
    a{text-decoration:none;color:inherit}
    button{font-family:var(--font-b);cursor:pointer;border:none;background:none;color:inherit}

    /* TOPBAR */
    .topbar{height:var(--topbar-h);flex-shrink:0;display:flex;align-items:center;gap:1rem;padding:0 1.5rem;background:var(--surface);border-bottom:1px solid var(--border);z-index:50}
    .btn-back{display:inline-flex;align-items:center;gap:.35rem;font-size:.78rem;font-weight:500;color:var(--muted);padding:.38rem .85rem;border-radius:100px;border:1px solid var(--border);transition:color .14s,border-color .14s,background .14s}
    .btn-back:hover{color:var(--accent-2);border-color:var(--accent);background:var(--accent-soft)}
    .topbar-brand{font-family:var(--font-d);font-size:1.15rem;color:var(--text);margin-right:auto}
    .topbar-brand span{color:var(--accent-2)}
    .topbar-tag{font-size:.72rem;color:var(--muted-2);padding:.28rem .75rem;border-radius:100px;border:1px solid var(--border);background:var(--surface-2)}

    /* SUBJECT HERO */
    .subj-hero{display:none;align-items:center;gap:.9rem;padding:1.25rem 1.5rem;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;position:relative;overflow:hidden}
    .subj-hero.visible{display:flex}
    .subj-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 100% at 100% 50%,rgba(99,102,241,.07),transparent 70%);pointer-events:none}
    .sh-icon{width:40px;height:40px;border-radius:9px;display:grid;place-items:center;font-size:18px;border:1px solid var(--border);flex-shrink:0}
    .sh-text h2{font-size:1.1rem;font-weight:500;color:var(--text)}
    .sh-text p{font-size:.7rem;color:var(--muted);margin-top:.1rem}

    /* LAYOUT */
    .layout{display:flex;flex:1;overflow:hidden}

    /* SIDEBAR */
    .sidebar{width:var(--sb-w);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
    .sidebar::-webkit-scrollbar{width:3px}
    .sidebar::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:3px}
    .sb-head{padding:1.4rem 1.25rem .75rem}
    .sb-eyebrow{font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.11em;color:var(--muted-2);margin-bottom:.3rem}
    .sb-title{font-family:var(--font-d);font-size:1.1rem;color:var(--text)}
    .sb-divider{height:1px;background:var(--border);margin:0 1.25rem .5rem}
    .sb-section{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted-2);padding:.6rem 1.25rem .3rem}
    .sb-nav{padding:0 .6rem .6rem;display:flex;flex-direction:column;gap:1px}
    .sb-item{display:flex;align-items:center;gap:.7rem;padding:.62rem .85rem;border-radius:8px;font-size:.82rem;color:var(--muted);transition:background .14s,color .14s;text-align:left;width:100%}
    .sb-item:hover{background:var(--surface-2);color:var(--text)}
    .sb-item.active{background:var(--accent-soft);color:var(--accent-2)}
    .sb-item .ico{font-size:14px;width:18px;text-align:center;flex-shrink:0}
    .sb-badge{margin-left:auto;font-size:.62rem;font-weight:500;background:var(--surface-3);color:var(--muted-2);padding:1px 7px;border-radius:100px;flex-shrink:0}
    .sb-item.active .sb-badge{background:var(--accent-soft);color:var(--accent-2)}

    /* MAIN */
    .main{flex:1;overflow-y:auto;background:var(--bg)}
    .main::-webkit-scrollbar{width:4px}
    .main::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:3px}

    /* SCREENS */
    .screen{display:none;padding:1.75rem 2.5rem 2.5rem;animation:fadeUp .2s ease}
    .screen.active{display:block}
    @keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
    .screen-back{display:inline-flex;align-items:center;gap:.3rem;font-size:.74rem;color:var(--muted-2);margin-bottom:1.25rem;transition:color .13s}
    .screen-back:hover{color:var(--accent-2)}

    /* HUB */
    .page-header{margin-bottom:1.75rem}
    .page-header h1{font-family:var(--font-d);font-size:1.75rem;font-weight:400;color:var(--text);margin-bottom:.25rem}
    .page-header p{font-size:.8rem;color:var(--muted)}
    .hub-section{margin-bottom:2rem}
    .hub-section-label{font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted-2);margin-bottom:.85rem;display:flex;align-items:center;gap:.6rem}
    .hub-section-label::after{content:'';flex:1;height:1px;background:var(--border)}
    .subj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:.85rem}
    .subj-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.2rem 1.3rem;display:flex;flex-direction:column;gap:.6rem;text-align:left;transition:border-color .18s,transform .18s,box-shadow .18s}
    .subj-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 22px rgba(99,102,241,.11)}
    .sc-top{display:flex;align-items:center;justify-content:space-between}
    .sc-icon{width:40px;height:40px;border-radius:9px;display:grid;place-items:center;font-size:19px;border:1px solid var(--border);flex-shrink:0}
    .sc-ch{font-size:.62rem;color:var(--muted-2);background:var(--surface-2);border:1px solid var(--border);padding:2px 7px;border-radius:100px}
    .sc-name{font-size:.9rem;font-weight:600;color:var(--text)}
    .sc-desc{font-size:.74rem;color:var(--muted);line-height:1.55;flex:1}
    .sc-foot{display:flex;align-items:center;justify-content:space-between}
    .sc-tags{display:flex;gap:.25rem;flex-wrap:wrap}
    .sc-arrow{font-size:.72rem;color:var(--muted-2);transition:color .13s,transform .13s}
    .subj-card:hover .sc-arrow{color:var(--accent-2);transform:translateX(2px)}
    .tag{font-size:.6rem;font-weight:500;background:var(--surface-2);color:var(--muted);padding:2px 6px;border-radius:4px;border:1px solid var(--border)}

    /* MODE */
    .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .mode-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.75rem 1.5rem;display:flex;flex-direction:column;gap:.8rem;text-align:left;transition:border-color .18s,transform .18s,box-shadow .18s}
    .mode-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 7px 24px rgba(99,102,241,.13)}
    .mc-icon{font-size:28px}
    .mc-title{font-family:var(--font-d);font-size:1.35rem;font-weight:400;color:var(--text)}
    .mc-desc{font-size:.78rem;color:var(--muted);line-height:1.65}
    .mc-cta{font-size:.75rem;font-weight:500;color:var(--accent-2);margin-top:auto;padding-top:.25rem}

    /* RESOURCE TYPES */
    .rt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.8rem}
    .rt-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:1.2rem 1.15rem;display:flex;flex-direction:column;gap:.5rem;text-align:left;cursor:pointer;transition:border-color .16s,transform .16s,box-shadow .16s}
    .rt-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 5px 18px rgba(99,102,241,.1)}
    .rt-icon{font-size:24px;margin-bottom:.1rem}
    .rt-title{font-size:.88rem;font-weight:600;color:var(--text)}
    .rt-desc{font-size:.72rem;color:var(--muted);line-height:1.5}
    .rt-count{font-size:.66rem;font-weight:500;color:var(--accent-2);margin-top:auto;padding-top:.2rem}

    /* DUMP */
    .dump-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border)}
    .dump-icon{width:46px;height:46px;border-radius:10px;display:grid;place-items:center;font-size:21px;border:1px solid var(--border);flex-shrink:0}
    .dump-header h2{font-family:var(--font-d);font-size:1.4rem;font-weight:400;color:var(--text);margin-bottom:.15rem}
    .dump-header p{font-size:.75rem;color:var(--muted)}

    /* RESOURCE CARDS */
    .res-list{display:flex;flex-direction:column;gap:.55rem}
    .res-card{display:flex;align-items:center;gap:.9rem;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.85rem 1.1rem;cursor:pointer;transition:border-color .15s,transform .15s;text-align:left;width:100%}
    .res-card:hover{border-color:var(--accent);transform:translateX(3px)}
    .rc-icon{width:38px;height:38px;border-radius:8px;display:grid;place-items:center;font-size:17px;border:1px solid var(--border);flex-shrink:0}
    .rc-info{flex:1;min-width:0}
    .rc-title{font-size:.84rem;font-weight:500;color:var(--text);margin-bottom:.1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .rc-sub{font-size:.68rem;color:var(--muted)}
    .rc-badge{font-size:.58rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--accent-2);background:var(--accent-soft);padding:.18rem .55rem;border-radius:100px;flex-shrink:0}
    .rc-arrow{font-size:.75rem;color:var(--muted-2);flex-shrink:0;transition:color .13s,transform .13s;margin-left:.35rem}
    .res-card:hover .rc-arrow{color:var(--accent-2);transform:translateX(2px)}

    /* LOADING / EMPTY */
    .loading-state,.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;text-align:center;gap:.6rem}
    .loading-spinner{width:28px;height:28px;border:2px solid var(--border-2);border-top-color:var(--accent-2);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-state p,.empty-state p{font-size:.78rem;color:var(--muted-2);line-height:1.6}
    .empty-state .ei{font-size:28px;opacity:.4;margin-bottom:.2rem}

    /* CHAPTER GRID */
    .sec-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem}
    .sec-lbl{font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted-2)}
    .sec-cnt{font-size:.7rem;color:var(--muted-2)}
    .ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:.8rem;margin-bottom:1.5rem}
    .ch-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.05rem 1.15rem;display:flex;flex-direction:column;gap:.6rem;transition:border-color .16s,transform .16s}
    .ch-card:hover{border-color:var(--accent);transform:translateY(-2px)}
    .ch-top{display:flex;align-items:center;justify-content:space-between}
    .ch-num{font-size:.62rem;font-weight:600;color:var(--accent-2);letter-spacing:.07em;text-transform:uppercase}
    .ch-pill{font-size:.6rem;font-weight:500;background:var(--surface-2);color:var(--muted-2);padding:2px 7px;border-radius:100px;border:1px solid var(--border);display:flex;align-items:center;gap:3px}
    .ch-pill::before{content:'';width:4px;height:4px;border-radius:50%;background:currentColor}
    .ch-title{font-size:.86rem;font-weight:500;color:var(--text);line-height:1.4}
    .ch-desc{font-size:.74rem;color:var(--muted);line-height:1.55;flex:1}
    .ch-foot{display:flex;align-items:center;justify-content:space-between}
    .ch-tags{display:flex;flex-wrap:wrap;gap:.25rem}
    .ch-arrow{font-size:.72rem;color:var(--muted-2);transition:color .13s,transform .13s}
    .ch-card:hover .ch-arrow{color:var(--accent-2);transform:translateX(2px)}

    /* ══════════════════════════
       MODAL VIEWER
    ══════════════════════════ */
    .modal-overlay{
      position:fixed;inset:0;z-index:1000;
      background:rgba(0,0,0,.85);
      display:none;flex-direction:column;
      animation:fadeIn .2s ease;
    }
    .modal-overlay.open{display:flex}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}

    .modal-bar{
      height:56px;flex-shrink:0;
      display:flex;align-items:center;gap:1rem;
      padding:0 1.25rem;
      background:var(--surface);
      border-bottom:1px solid var(--border);
    }
    .modal-title{
      flex:1;font-size:.9rem;font-weight:500;color:var(--text);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .modal-close{
      display:inline-flex;align-items:center;gap:.35rem;
      font-size:.78rem;font-weight:500;color:var(--muted);
      padding:.38rem .85rem;border-radius:100px;
      border:1px solid var(--border);
      transition:color .14s,border-color .14s,background .14s;
      flex-shrink:0;
    }
    .modal-close:hover{color:var(--text);border-color:var(--border-2);background:var(--surface-2)}

    .modal-open-btn{
      display:inline-flex;align-items:center;gap:.35rem;
      font-size:.78rem;font-weight:500;color:var(--accent-2);
      padding:.38rem .85rem;border-radius:100px;
      border:1px solid var(--accent);background:var(--accent-soft);
      transition:background .14s;flex-shrink:0;text-decoration:none;
    }
    .modal-open-btn:hover{background:var(--accent);color:#fff}

    .modal-body{
      flex:1;overflow:hidden;position:relative;
      background:#000;
    }
    .modal-body iframe{
      width:100%;height:100%;border:none;display:block;
    }
    .modal-loading{
      position:absolute;inset:0;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;
      background:#000;color:var(--muted-2);font-size:.8rem;
      pointer-events:none;
    }
    .modal-loading .loading-spinner{border-top-color:var(--accent-2)}
    .modal-body iframe.loaded + .modal-loading{display:none}

    @media(max-width:900px){html,body{overflow:auto}.sidebar{display:none}.screen{padding:1.25rem 1rem 2rem}}
    @media(max-width:600px){.mode-grid{grid-template-columns:1fr}.topbar{padding:0 1rem}.topbar-tag{display:none}.subj-hero{padding:1rem}}
    @media(max-width:480px){.ch-grid{grid-template-columns:1fr}.rt-grid{grid-template-columns:1fr 1fr}.subj-grid{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>

<!-- MODAL VIEWER -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-bar">
    <button class="modal-close" id="modalClose">✕ Close</button>
    <span class="modal-title" id="modalTitle"></span>
    <a class="modal-open-btn" id="modalOpenLink" href="#" target="_blank" rel="noopener">
      Open in Drive ↗
    </a>
  </div>
  <div class="modal-body">
    <iframe id="modalFrame" src="" allowfullscreen></iframe>
    <div class="modal-loading">
      <div class="loading-spinner"></div>
      <p>Loading…</p>
    </div>
  </div>
</div>

<header class="topbar">
  <button class="btn-back" id="topBackBtn">← Back</button>
  <span class="topbar-brand">Study<span>Hub</span></span>
  <span class="topbar-tag">Class 12 · CBSE</span>
</header>

<div class="subj-hero" id="subjHero">
  <div class="sh-icon" id="subjHeroIcon"></div>
  <div class="sh-text"><h2 id="subjHeroName"></h2><p id="subjHeroMeta"></p></div>
</div>

<div class="layout">

  <aside class="sidebar">
    <div class="sb-head"><p class="sb-eyebrow">Class 12</p><p class="sb-title">Resources &amp; Notes</p></div>
    <div class="sb-divider"></div>
    <p class="sb-section">Science</p>
    <nav class="sb-nav">
      <button class="sb-item" data-subj="physics">  <span class="ico">⚡</span>Physics   <span class="sb-badge">15</span></button>
      <button class="sb-item" data-subj="chemistry"><span class="ico">🧪</span>Chemistry <span class="sb-badge">16</span></button>
      <button class="sb-item" data-subj="biology">  <span class="ico">🌱</span>Biology   <span class="sb-badge">16</span></button>
    </nav>
    <p class="sb-section">Mathematics</p>
    <nav class="sb-nav">
      <button class="sb-item" data-subj="maths"><span class="ico">📐</span>Mathematics <span class="sb-badge">13</span></button>
    </nav>
    <p class="sb-section">Languages &amp; Humanities</p>
    <nav class="sb-nav">
      <button class="sb-item" data-subj="english">  <span class="ico">📖</span>English   <span class="sb-badge">8</span></button>
      <button class="sb-item" data-subj="history">  <span class="ico">🏛️</span>History   <span class="sb-badge">15</span></button>
      <button class="sb-item" data-subj="economics"><span class="ico">💰</span>Economics <span class="sb-badge">10</span></button>
    </nav>
    <p class="sb-section">Technology</p>
    <nav class="sb-nav">
      <button class="sb-item" data-subj="cs"><span class="ico">💻</span>Computer Sci. <span class="sb-badge">9</span></button>
    </nav>
  </aside>

  <main class="main" id="mainArea">

    <!-- SCREEN 0: Hub -->
    <div class="screen active" id="screen-hub">
      <div class="page-header"><h1>Resources &amp; Notes</h1><p>Pick a subject to get started.</p></div>
      <div class="hub-section"><p class="hub-section-label">Science</p>
        <div class="subj-grid">
          <button class="subj-card" data-subj="physics"><div class="sc-top"><div class="sc-icon" style="background:#1e1d3a">⚡</div><span class="sc-ch">15 ch</span></div><p class="sc-name">Physics</p><p class="sc-desc">Electric charges, optics, modern physics, semiconductors.</p><div class="sc-foot"><div class="sc-tags"><span class="tag">Notes</span><span class="tag">PYQs</span><span class="tag">Formulae</span></div><span class="sc-arrow">→</span></div></button>
          <button class="subj-card" data-subj="chemistry"><div class="sc-top"><div class="sc-icon" style="background:#0d2626">🧪</div><span class="sc-ch">16 ch</span></div><p class="sc-name">Chemistry</p><p class="sc-desc">Solid state, electrochemistry, organic chemistry.</p><div class="sc-foot"><div class="sc-tags"><span class="tag">Notes</span><span class="tag">PYQs</span></div><span class="sc-arrow">→</span></div></button>
          <button class="subj-card" data-subj="biology"><div class="sc-top"><div class="sc-icon" style="background:#0d1f15">🌱</div><span class="sc-ch">16 ch</span></div><p class="sc-name">Biology</p><p class="sc-desc">Reproduction, genetics, evolution, biotechnology.</p><div class="sc-foot"><div class="sc-tags"><span class="tag">Notes</span><span class="tag">Diagrams</span></div><span class="sc-arrow">→</span></div></button>
        </div>
      </div>
      <div class="hub-section"><p class="hub-section-label">Mathematics</p>
        <div class="subj-grid">
          <button class="subj-card" data-subj="maths"><div class="sc-top"><div class="sc-icon" style="background:#1f1a0d">📐</div><span class="sc-ch">13 ch</span></div><p class="sc-name">Mathematics</p><p class="sc-desc">Relations, matrices, calculus, vectors, probability.</p><div class="sc-foot"><div class="sc-tags"><span class="tag">Notes</span><span class="tag">Formulae</span></div><span class="sc-arrow">→</span></div></button>
        </div>
      </div>
      <div class="hub-section"><p class="hub-section-label">Languages &amp; Humanities</p>
        <div class="subj-grid">
          <button class="subj-card" data-subj="english"><div class="sc-top"><div class="sc-icon" style="background:#1f0d10">📖</div><span class="sc-ch">8 ch</span></div><p class="sc-name">English</p><p class="sc-desc">Flamingo and Vistas — prose, poetry, summaries.</p><div class="sc-foot"><div class="sc-tags"><span class="tag">Notes</span><span class="tag">Q&amp;A</span></div><span class="sc-arrow">→</span></div></button>
          <button class="subj-card" data-subj="history"><div class="sc-top"><div class="sc-icon" style="background:#1a1520">🏛️</div><span class="sc-ch">15 ch</span></div><p class="sc-name">History</p><p class="sc-desc">Ancient, medieval and modern Indian history.</p><div class="sc-foot"><div class="sc-tags"><span class="tag">Notes</span><span class="tag">Maps</span></div><span class="sc-arrow">→</span></div></button>
          <button class="subj-card" data-subj="economics"><div class="sc-top"><div class="sc-icon" style="background:#1f1408">💰</div><span class="sc-ch">10 ch</span></div><p class="sc-name">Economics</p><p class="sc-desc">Micro and macroeconomics — theory and graphs.</p><div class="sc-foot"><div class="sc-tags"><span class="tag">Notes</span><span class="tag">Graphs</span></div><span class="sc-arrow">→</span></div></button>
        </div>
      </div>
      <div class="hub-section"><p class="hub-section-label">Technology</p>
        <div class="subj-grid">
          <button class="subj-card" data-subj="cs"><div class="sc-top"><div class="sc-icon" style="background:#111518">💻</div><span class="sc-ch">9 ch</span></div><p class="sc-name">Computer Science</p><p class="sc-desc">Python, OOP, file handling, SQL, networking.</p><div class="sc-foot"><div class="sc-tags"><span class="tag">Notes</span><span class="tag">Programs</span></div><span class="sc-arrow">→</span></div></button>
        </div>
      </div>
    </div>

    <!-- SCREEN 1: Mode -->
    <div class="screen" id="screen-mode">
      <button class="screen-back" id="modeBack">← Back to subjects</button>
      <div class="mode-grid">
        <button class="mode-card" id="btnChapterwise">
          <div class="mc-icon">📚</div>
          <p class="mc-title">Chapterwise</p>
          <p class="mc-desc">Browse all chapters one by one. Click into any chapter to open its resources.</p>
          <span class="mc-cta">Go to chapters →</span>
        </button>
        <button class="mode-card" id="btnComplete">
          <div class="mc-icon">📂</div>
          <p class="mc-title">Complete</p>
          <p class="mc-desc">Pick Notes, PYQs, Formulae, Videos etc. and view all resources for that type at once.</p>
          <span class="mc-cta">Pick resource type →</span>
        </button>
      </div>
    </div>

    <!-- SCREEN 2A: Chapters -->
    <div class="screen" id="screen-chapters">
      <button class="screen-back" id="chapBack">← Back</button>
      <div id="chapContent"></div>
    </div>

    <!-- SCREEN 2B: Resource types -->
    <div class="screen" id="screen-restypes">
      <button class="screen-back" id="restypeBack">← Back</button>
      <div class="rt-grid" id="rtGrid"></div>
    </div>

    <!-- SCREEN 3: Resource list -->
    <div class="screen" id="screen-dump">
      <button class="screen-back" id="dumpBack">← Back</button>
      <div class="dump-header">
        <div class="dump-icon" id="dumpIcon"></div>
        <div><h2 id="dumpTitle"></h2><p id="dumpSubTitle"></p></div>
      </div>
      <div id="dumpList"></div>
    </div>

  </main>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

  /* ══════════════════════════════════════════════
     CONFIGURATION
  ══════════════════════════════════════════════ */

  var API_KEY = 'AIzaSyBqYAqoFVfhYQ54_ly5kVdfmcaXLcIpsQs';

  var subjects = {
    physics:   { name:'Physics',         icon:'⚡', bg:'#1e1d3a', meta:'Class 12 · CBSE · 15 Chapters' },
    chemistry: { name:'Chemistry',       icon:'🧪', bg:'#0d2626', meta:'Class 12 · CBSE · 16 Chapters' },
    biology:   { name:'Biology',         icon:'🌱', bg:'#0d1f15', meta:'Class 12 · CBSE · 16 Chapters' },
    maths:     { name:'Mathematics',     icon:'📐', bg:'#1f1a0d', meta:'Class 12 · CBSE · 13 Chapters' },
    english:   { name:'English',         icon:'📖', bg:'#1f0d10', meta:'Class 12 · CBSE · Flamingo & Vistas' },
    history:   { name:'History',         icon:'🏛️', bg:'#1a1520', meta:'Class 12 · CBSE · 15 Chapters' },
    economics: { name:'Economics',       icon:'💰', bg:'#1f1408', meta:'Class 12 · CBSE · 10 Chapters' },
    cs:        { name:'Computer Science',icon:'💻', bg:'#111518', meta:'Class 12 · CBSE · 9 Chapters'  },
  };

  /* ──────────────────────────────────────────────
     RESOURCES DATA
     type:'folder' → Google Drive folder ID (API auto-lists all files inside)
     type:'file'   → any direct link (Drive file, YouTube, PDF URL)

     For Drive files, the viewer will embed them in a modal.
     For YouTube links, they'll play in the modal.
     For folders, all files inside show as individual cards.
  ────────────────────────────────────────────── */
  var resources = {
    physics: {
      notes: [
        { type:'folder', id:'1BJO7P1ullg2DczBn_DZBQD7IF9KebpME', title:'Physics Notes', icon:'📁' },
      ],
      formulae: [
        { type:'file', link:'https://drive.google.com/file/d/1lC-uhHg_bOjrlmBYwwIxxf0EL-eofcIF/view', title:'Formula Sheet', sub:'Google Drive · PDF', badge:'PDF', icon:'📄' },
      ],
      pyqs:[],numericals:[],videos:[],diagrams:[],
    },
    chemistry: { notes:[],formulae:[],pyqs:[],numericals:[],videos:[],diagrams:[] },
    biology:   { notes:[],formulae:[],pyqs:[],numericals:[],videos:[],diagrams:[] },
    maths:     { notes:[],formulae:[],pyqs:[],numericals:[],videos:[],diagrams:[] },
    english:   { notes:[],formulae:[],pyqs:[],numericals:[],videos:[],diagrams:[] },
    history:   { notes:[],formulae:[],pyqs:[],numericals:[],videos:[],diagrams:[] },
    economics: { notes:[],formulae:[],pyqs:[],numericals:[],videos:[],diagrams:[] },
    cs:        { notes:[],formulae:[],pyqs:[],numericals:[],videos:[],diagrams:[] },
  };

  var resTypes = [
    { key:'notes',      icon:'📄', title:'Notes',          desc:'Theory notes and study material.' },
    { key:'formulae',   icon:'📐', title:'Formula Sheets', desc:'Key formulae and derivations.'    },
    { key:'pyqs',       icon:'🎯', title:'PYQs',           desc:'Past year question papers.'       },
    { key:'numericals', icon:'🔢', title:'Numericals',     desc:'Solved numerical problems.'       },
    { key:'videos',     icon:'🎬', title:'Video Links',    desc:'Curated video lectures.'          },
    { key:'diagrams',   icon:'🖼️', title:'Diagrams',       desc:'Important labelled diagrams.'    },
  ];

  var chapters = {
    physics: {
      parts: [
        { label:'Part I — Chapters 1–8', chapters:[
          {n:'01',t:'Electric Charges and Fields',          d:"Coulomb's law, electric field, Gauss's law.",        tags:['Notes','Formulae']},
          {n:'02',t:'Electrostatic Potential & Capacitance',d:'Potential, capacitors, dielectrics.',               tags:['Notes','Formulae']},
          {n:'03',t:'Current Electricity',                  d:"Ohm's law, Kirchhoff's laws, Wheatstone bridge.",   tags:['Notes','Numericals']},
          {n:'04',t:'Moving Charges and Magnetism',         d:"Biot-Savart law, Ampere's law, solenoid.",          tags:['Notes','Formulae']},
          {n:'05',t:'Magnetism and Matter',                 d:"Bar magnet, Earth's magnetism, ferromagnetism.",    tags:['Notes']},
          {n:'06',t:'Electromagnetic Induction',            d:"Faraday's laws, Lenz's law, inductance.",           tags:['Notes','Formulae']},
          {n:'07',t:'Alternating Current',                  d:'LCR circuit, resonance, power factor, transformers.',tags:['Notes','Numericals']},
          {n:'08',t:'Electromagnetic Waves',                d:"Maxwell's equations, EM spectrum.",                 tags:['Notes']},
        ]},
        { label:'Part II — Chapters 9–15', chapters:[
          {n:'09',t:'Ray Optics and Optical Instruments',   d:'Reflection, refraction, TIR, lenses, mirrors.',     tags:['Notes','Diagrams']},
          {n:'10',t:'Wave Optics',                          d:"Huygens' principle, interference, diffraction.",    tags:['Notes','Formulae']},
          {n:'11',t:'Dual Nature of Radiation and Matter',  d:"Photoelectric effect, de Broglie wavelength.",      tags:['Notes','Numericals']},
          {n:'12',t:'Atoms',                                d:"Rutherford model, Bohr's model, hydrogen spectrum.",tags:['Notes','Formulae']},
          {n:'13',t:'Nuclei',                               d:'Binding energy, radioactivity, fission, fusion.',   tags:['Notes','Numericals']},
          {n:'14',t:'Semiconductor Electronic Devices',     d:'p-n junction, diode, transistor, logic gates.',     tags:['Notes','Diagrams']},
          {n:'15',t:'Communication Systems',                d:'Modulation, AM/FM, satellite communication.',       tags:['Notes']},
        ]},
      ]
    },
  };

  /* ══════════════════════════════════════════════
     END CONFIGURATION
  ══════════════════════════════════════════════ */

  var currentSubj = null;
  var mainArea    = document.getElementById('mainArea');

  /* ── Modal ── */
  var modalOverlay  = document.getElementById('modalOverlay');
  var modalFrame    = document.getElementById('modalFrame');
  var modalTitle    = document.getElementById('modalTitle');
  var modalOpenLink = document.getElementById('modalOpenLink');

  function getEmbedUrl(link) {
    // Google Drive file — convert to preview
    var driveFile = link.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);
    if (driveFile) return 'https://drive.google.com/file/d/' + driveFile[1] + '/preview';

    // Google Drive folder — convert to embedded folder view
    var driveFolder = link.match(/drive\.google\.com\/drive\/folders\/([^\/\?]+)/);
    if (driveFolder) return 'https://drive.google.com/embeddedfolderview?id=' + driveFolder[1] + '#list';

    // YouTube watch link
    var yt = link.match(/youtube\.com\/watch\?v=([^&]+)/);
    if (yt) return 'https://www.youtube.com/embed/' + yt[1];

    // YouTube short link
    var yts = link.match(/youtu\.be\/([^\/\?]+)/);
    if (yts) return 'https://www.youtube.com/embed/' + yts[1];

    // YouTube playlist
    var ytpl = link.match(/youtube\.com\/playlist\?list=([^&]+)/);
    if (ytpl) return 'https://www.youtube.com/embed/videoseries?list=' + ytpl[1];

    // Fallback — use as-is
    return link;
  }

  function openModal(title, link) {
    var embedUrl = getEmbedUrl(link);
    modalTitle.textContent    = title;
    modalOpenLink.href        = link;
    modalFrame.src            = '';
    modalFrame.classList.remove('loaded');
    modalOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';

    // slight delay so loading spinner shows first
    setTimeout(function() {
      modalFrame.src = embedUrl;
      modalFrame.onload = function() { modalFrame.classList.add('loaded'); };
    }, 100);
  }

  function closeModal() {
    modalOverlay.classList.remove('open');
    modalFrame.src = '';
    document.body.style.overflow = '';
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', function(e) {
    if (e.target === modalOverlay) closeModal();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });

  /* ── Screen navigation ── */
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
    mainArea.scrollTop = 0;
  }

  function setHero(subj) {
    var d = subjects[subj];
    document.getElementById('subjHeroIcon').textContent      = d.icon;
    document.getElementById('subjHeroIcon').style.background = d.bg;
    document.getElementById('subjHeroName').textContent      = d.name;
    document.getElementById('subjHeroMeta').textContent      = d.meta;
    document.getElementById('subjHero').classList.add('visible');
  }

  function clearHero() {
    document.getElementById('subjHero').classList.remove('visible');
    document.querySelectorAll('.sb-item').forEach(function(b){ b.classList.remove('active'); });
  }

  function pickSubject(subj) {
    currentSubj = subj;
    setHero(subj);
    document.querySelectorAll('.sb-item,.subj-card').forEach(function(b){ b.classList.remove('active'); });
    document.querySelectorAll('[data-subj="'+subj+'"]').forEach(function(b){ b.classList.add('active'); });
    showScreen('screen-mode');
  }

  /* ── Chapter cards ── */
  function buildChapters(subj) {
    var data = chapters[subj];
    if (!data) {
      document.getElementById('chapContent').innerHTML =
        '<p style="font-size:.8rem;color:var(--muted-2);padding:.5rem 0">Chapters coming soon.</p>';
      return;
    }
    var html = '';
    data.parts.forEach(function(part) {
      html += '<div class="sec-row"><span class="sec-lbl">'+part.label+'</span><span class="sec-cnt">'+part.chapters.length+' chapters</span></div>';
      html += '<div class="ch-grid">';
      part.chapters.forEach(function(ch) {
        var tags = ch.tags.map(function(t){ return '<span class="tag">'+t+'</span>'; }).join('');
        html += '<div class="ch-card">'+
          '<div class="ch-top"><span class="ch-num">Ch '+ch.n+'</span><span class="ch-pill">Coming Soon</span></div>'+
          '<p class="ch-title">'+ch.t+'</p>'+
          '<p class="ch-desc">'+ch.d+'</p>'+
          '<div class="ch-foot"><div class="ch-tags">'+tags+'</div><span class="ch-arrow">→</span></div>'+
          '</div>';
      });
      html += '</div>';
    });
    document.getElementById('chapContent').innerHTML = html;
  }

  /* ── Resource type grid ── */
  function buildResTypes(subj) {
    var html = resTypes.map(function(rt) {
      var items = (resources[subj] && resources[subj][rt.key]) || [];
      var label = items.length > 0 ? 'Available →' : 'Coming soon';
      return '<button class="rt-card" data-rt="'+rt.key+'">' +
        '<div class="rt-icon">'+rt.icon+'</div>' +
        '<p class="rt-title">'+rt.title+'</p>' +
        '<p class="rt-desc">'+rt.desc+'</p>' +
        '<p class="rt-count">'+label+'</p>' +
        '</button>';
    }).join('');
    document.getElementById('rtGrid').innerHTML = html;
    document.querySelectorAll('#rtGrid .rt-card').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var rtKey = this.getAttribute('data-rt');
        var rt = resTypes.find(function(r){ return r.key === rtKey; });
        openDump(rt, subj);
      });
    });
  }

  /* ── Drive API fetch ── */
  function fetchFolderFiles(folderId) {
    var url = 'https://www.googleapis.com/drive/v3/files' +
      '?q=' + encodeURIComponent('"'+folderId+'" in parents and trashed=false') +
      '&fields=files(id,name,mimeType,webViewLink)' +
      '&orderBy=name' +
      '&key=' + API_KEY;
    return fetch(url).then(function(r){ return r.json(); });
  }

  function getMeta(mimeType) {
    if (mimeType === 'application/pdf') return { icon:'📄', badge:'PDF' };
    if (mimeType === 'application/vnd.google-apps.folder') return { icon:'📁', badge:'Folder' };
    if (mimeType === 'application/vnd.google-apps.document') return { icon:'📝', badge:'Doc' };
    if (mimeType === 'application/vnd.google-apps.spreadsheet') return { icon:'📊', badge:'Sheet' };
    if (mimeType === 'application/vnd.google-apps.presentation') return { icon:'📋', badge:'Slides' };
    if (mimeType && mimeType.startsWith('video/')) return { icon:'🎬', badge:'Video' };
    if (mimeType && mimeType.startsWith('image/')) return { icon:'🖼️', badge:'Image' };
    return { icon:'📎', badge:'File' };
  }

  /* ── Render resource cards — clicking opens modal ── */
  function renderCards(items, bg) {
    if (!items.length) {
      return '<div class="empty-state"><div class="ei">📭</div><p>No resources added yet.<br>Check back soon!</p></div>';
    }
    var container = document.createElement('div');
    container.className = 'res-list';
    items.forEach(function(item) {
      var btn = document.createElement('button');
      btn.className = 'res-card';
      btn.innerHTML =
        '<div class="rc-icon" style="background:'+bg+'">'+item.icon+'</div>' +
        '<div class="rc-info">' +
          '<p class="rc-title">'+item.title+'</p>' +
          '<p class="rc-sub">'+item.sub+'</p>' +
        '</div>' +
        '<span class="rc-badge">'+item.badge+'</span>' +
        '<span class="rc-arrow">→</span>';
      btn.addEventListener('click', function() {
        openModal(item.title, item.link);
      });
      container.appendChild(btn);
    });
    return container.outerHTML;
  }

  /* ── Open dump screen ── */
  function openDump(rt, subj) {
    var d = subjects[subj];
    document.getElementById('dumpIcon').textContent      = rt.icon;
    document.getElementById('dumpIcon').style.background = d.bg;
    document.getElementById('dumpTitle').textContent     = d.name + ' — ' + rt.title;
    document.getElementById('dumpSubTitle').textContent  = d.meta;

    var items = (resources[subj] && resources[subj][rt.key]) || [];

    if (!items.length) {
      document.getElementById('dumpList').innerHTML =
        '<div class="empty-state"><div class="ei">📭</div><p>No resources added yet.<br>Check back soon!</p></div>';
      showScreen('screen-dump');
      return;
    }

    document.getElementById('dumpList').innerHTML =
      '<div class="loading-state"><div class="loading-spinner"></div><p>Loading resources…</p></div>';
    showScreen('screen-dump');

    var folders   = items.filter(function(i){ return i.type === 'folder'; });
    var fileItems = items.filter(function(i){ return i.type === 'file'; });

    var manualCards = fileItems.map(function(f) {
      return { title:f.title, sub:f.sub||'Google Drive', icon:f.icon||'📄', badge:f.badge||'File', link:f.link };
    });

    if (!folders.length) {
      document.getElementById('dumpList').innerHTML = renderCards(manualCards, d.bg);
      rewireCards();
      return;
    }

    var folderPromises = folders.map(function(folder) {
      if (API_KEY === 'PASTE_YOUR_API_KEY_HERE') {
        return Promise.resolve([{
          title: folder.title || 'Drive Folder',
          sub:   'Google Drive · click to view inside',
          icon:  '📁', badge:'Folder',
          link:  'https://drive.google.com/drive/folders/' + folder.id,
        }]);
      }
      return fetchFolderFiles(folder.id).then(function(data) {
        if (!data.files || !data.files.length) return [];
        return data.files.map(function(file) {
          var meta = getMeta(file.mimeType);
          return { title:file.name, sub:'Google Drive · '+meta.badge, icon:meta.icon, badge:meta.badge, link:file.webViewLink };
        });
      }).catch(function() {
        return [{
          title: folder.title || 'Drive Folder',
          sub:   'Google Drive · click to view',
          icon:  '📁', badge:'Folder',
          link:  'https://drive.google.com/drive/folders/' + folder.id,
        }];
      });
    });

    Promise.all(folderPromises).then(function(results) {
      var folderCards = [].concat.apply([], results);
      var allCards    = folderCards.concat(manualCards);
      document.getElementById('dumpList').innerHTML = renderCards(allCards, d.bg);
      rewireCards(allCards, d.bg);
    });
  }

  /* Re-wire card click handlers after innerHTML set */
  function rewireCards(items, bg) {
    document.querySelectorAll('#dumpList .res-card').forEach(function(btn, i) {
      if (items && items[i]) {
        btn.addEventListener('click', function() {
          openModal(items[i].title, items[i].link);
        });
      }
    });
  }

  /* ── Wire everything ── */
  document.querySelectorAll('.subj-card[data-subj], .sb-item[data-subj]').forEach(function(btn) {
    btn.addEventListener('click', function(){ pickSubject(this.getAttribute('data-subj')); });
  });

  document.getElementById('btnChapterwise').addEventListener('click', function() {
    buildChapters(currentSubj); showScreen('screen-chapters');
  });
  document.getElementById('btnComplete').addEventListener('click', function() {
    buildResTypes(currentSubj); showScreen('screen-restypes');
  });

  document.getElementById('modeBack').addEventListener('click', function() {
    clearHero(); currentSubj = null; showScreen('screen-hub');
  });
  document.getElementById('chapBack').addEventListener('click', function(){ showScreen('screen-mode'); });
  document.getElementById('restypeBack').addEventListener('click', function(){ showScreen('screen-mode'); });
  document.getElementById('dumpBack').addEventListener('click', function(){ showScreen('screen-restypes'); });

  document.getElementById('topBackBtn').addEventListener('click', function() {
    var active = document.querySelector('.screen.active');
    if (!active) return;
    var map = {
      'screen-hub':'home','screen-mode':'screen-hub',
      'screen-chapters':'screen-mode','screen-restypes':'screen-mode','screen-dump':'screen-restypes',
    };
    var next = map[active.id];
    if (next === 'home') window.location.href = '/';
    else if (next === 'screen-hub') { clearHero(); currentSubj = null; showScreen(next); }
    else showScreen(next);
  });

});
</script>
</body>
</html>
